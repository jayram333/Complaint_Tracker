<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold">

Complaint Tracker - Receiver Portal

</a>

<button class="btn btn-light" onclick="logout()">

Logout

</button>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-4">

Admin Dashboard

</h2>

<!-- Dashboard Cards -->

<div class="row g-3">

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Total Complaints</h5>

<h2 id="total">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Submitted</h5>

<h2 id="submitted">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>In Progress</h5>

<h2 id="progress">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Resolved</h5>

<h2 id="resolved">0</h2>

</div>

</div>

</div>

</div>

<!-- Search -->

<div class="row mt-4">

<div class="col-md-6">

<input
type="text"
id="search"
class="form-control"
placeholder="Search Complaint">

</div>

<div class="col-md-6 text-end">

<a
href="view-complaints.html"
class="btn btn-primary">

Manage Complaints

</a>

</div>

</div>

<!-- Recent Complaints -->

<div class="card mt-4 shadow">

<div class="card-header bg-primary text-white">

Recent Complaints

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover">

<thead class="table-light">

<tr>

<th>ID</th>

<th>Name</th>

<th>Title</th>

<th>Category</th>

<th>Status</th>

<th>Priority</th>

<th>Action</th>

</tr>

</thead>

<tbody id="complaintTable">

</tbody>

</table>

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script>

if (localStorage.getItem("adminLogin") !== "true") {
    alert("Please login as Admin.");
    window.location.href = "admin-login.html";
    throw new Error("Admin not logged in");
}

let complaints = [];

async function loadDashboard() {

    const { data, error } = await supabaseClient
        .from("complaints")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        alert("Unable to load complaints.");
        return;
    }

    complaints = data || [];

    document.getElementById("total").innerHTML = complaints.length;

    document.getElementById("submitted").innerHTML =
        complaints.filter(c => c.status === "Submitted").length;

    document.getElementById("progress").innerHTML =
        complaints.filter(c => c.status === "In Progress").length;

    document.getElementById("resolved").innerHTML =
        complaints.filter(c => c.status === "Resolved").length;

    loadTable(complaints);
}

function loadTable(data) {

    let rows = "";

    if (data.length === 0) {

        rows = `
        <tr>
            <td colspan="7" class="text-center">
                No Complaints Found
            </td>
        </tr>
        `;

    } else {

        data.forEach(c => {

            rows += `
            <tr>
                <td>${c.id}</td>
                <td>${c.name}</td>
                <td>${c.title}</td>
                <td>${c.category}</td>
                <td>
                    <span class="badge bg-info">
                        ${c.status}
                    </span>
                </td>
                <td>${c.priority}</td>
                <td>
                    <button
                        class="btn btn-success btn-sm"
                        onclick="viewComplaint('${c.id}')">
                        View
                    </button>
                </td>
            </tr>
            `;

        });

    }

    document.getElementById("complaintTable").innerHTML = rows;
}

document.getElementById("search").addEventListener("keyup", function () {

    const text = this.value.toLowerCase();

    const result = complaints.filter(c =>

        String(c.id).toLowerCase().includes(text) ||

        (c.title || "").toLowerCase().includes(text) ||

        (c.name || "").toLowerCase().includes(text)

    );

    loadTable(result);

});

function viewComplaint(id) {

    localStorage.setItem("selectedComplaint", id);

    window.location.href = "complaint-details.html";

}

function logout() {

    localStorage.removeItem("adminLogin");

    window.location.href = "admin-login.html";

}

loadDashboard();

</script>
</body>

</html>
