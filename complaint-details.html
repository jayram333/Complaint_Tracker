<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Complaint Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold">
Complaint Tracker - Admin
</a>

<a href="admin-dashboard.html" class="btn btn-light">
Back
</a>

</div>

</nav>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>Complaint Details</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-8">

<table class="table table-bordered">

<tr>
<th width="30%">Complaint ID</th>
<td id="id"></td>
</tr>

<tr>
<th>Name</th>
<td id="name"></td>
</tr>

<tr>
<th>Email</th>
<td id="email"></td>
</tr>

<tr>
<th>Mobile</th>
<td id="mobile"></td>
</tr>

<tr>
<th>Title</th>
<td id="title"></td>
</tr>

<tr>
<th>Category</th>
<td id="category"></td>
</tr>

<tr>
<th>Priority</th>
<td id="priority"></td>
</tr>

<tr>
<th>Description</th>
<td id="description"></td>
</tr>

<tr>
<th>Location</th>
<td id="location"></td>
</tr>

<tr>
<th>Date</th>
<td id="date"></td>
</tr>

</table>

</div>

<div class="col-md-4">

<h5>Uploaded Image</h5>

<img id="image"
class="img-fluid rounded border"
src="https://via.placeholder.com/300x200?text=No+Image">

</div>

</div>

<hr>

<h4>Update Complaint</h4>

<div class="mb-3">

<label>Status</label>

<select id="status" class="form-select">

<option>Submitted</option>
<option>Under Review</option>
<option>Assigned</option>
<option>In Progress</option>
<option>Resolved</option>
<option>Rejected</option>

</select>

</div>

<div class="mb-3">

<label>Admin Remarks</label>

<textarea
id="remarks"
rows="4"
class="form-control"></textarea>

</div>

<button
class="btn btn-success btn-lg"
onclick="updateComplaint()">

Save Changes

</button>

<hr>

<h4 class="mt-4">

Complaint Timeline

</h4>

<ul class="list-group" id="timeline">

</ul>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

<script>

if(localStorage.getItem("adminLogin")!="true"){

window.location="admin-login.html";

}

const complaintId=localStorage.getItem("selectedComplaint");

let complaint={};

async function loadComplaint(){

const {data,error}=await supabaseClient
.from("complaints")
.select("*")
.eq("id",complaintId)
.single();

if(error||!data){

alert("Complaint Not Found");

window.location="view-complaints.html";

return;

}

complaint=data;

document.getElementById("id").innerHTML=complaint.id;
document.getElementById("name").innerHTML=complaint.name;
document.getElementById("email").innerHTML=complaint.email;
document.getElementById("mobile").innerHTML=complaint.mobile;
document.getElementById("title").innerHTML=complaint.title;
document.getElementById("category").innerHTML=complaint.category;
document.getElementById("priority").innerHTML=complaint.priority;
document.getElementById("description").innerHTML=complaint.description;
document.getElementById("location").innerHTML=complaint.location;

document.getElementById("date").innerHTML=
complaint.created_at?
new Date(complaint.created_at).toLocaleString("en-IN"):
complaint.date;

document.getElementById("status").value=complaint.status;

document.getElementById("remarks").value=
complaint.remarks||"";

if(complaint.image){

document.getElementById("image").src=complaint.image;

}

showTimeline();
}

function showTimeline(){

let html="";

if(complaint.timeline&&complaint.timeline.length){

complaint.timeline.forEach(t=>{

html+=`
<li class="list-group-item">

<b>${t.status}</b>

<br>

<small>${t.date}</small>

</li>
`;

});

}else{

html=`
<li class="list-group-item text-center">

No Timeline

</li>
`;

}

document.getElementById("timeline").innerHTML=html;

}
async function updateComplaint(){

const status=document.getElementById("status").value;

const remarks=document.getElementById("remarks").value;

let timeline=complaint.timeline||[];

timeline.push({

status:status,

date:new Date().toLocaleString("en-IN")

});

const {error}=await supabaseClient

.from("complaints")

.update({

status:status,

remarks:remarks,

timeline:timeline

})

.eq("id",complaint.id);

if(error){

alert(error.message);

return;

}

alert("Complaint Updated Successfully");

loadComplaint();

}

loadComplaint();

</script>

</body>

</html>
