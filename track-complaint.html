<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Complaint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<a href="sender-dashboard.html" class="navbar-brand fw-bold">
Complaint Tracker
</a>

<a href="complaint-history.html" class="btn btn-light">
Back
</a>
</div>
</nav>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>Complaint Details</h3>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-8">

<table class="table table-bordered">

<tr>
<th width="30%">Complaint ID</th>
<td id="cid"></td>
</tr>

<tr>
<th>Title</th>
<td id="title"></td>
</tr>

<tr>
<th>Category</th>
<td id="category"></td>
</tr>

<tr>
<th>Priority</th>
<td id="priority"></td>
</tr>

<tr>
<th>Description</th>
<td id="description"></td>
</tr>

<tr>
<th>Location</th>
<td id="location"></td>
</tr>

<tr>
<th>Date</th>
<td id="date"></td>
</tr>

<tr>
<th>Status</th>
<td>
<span class="badge bg-success fs-6" id="status"></span>
</td>
</tr>

<tr>
<th>Admin Remarks</th>
<td id="remarks"></td>
</tr>

</table>

</div>

<div class="col-md-4">

<h5>Uploaded Image</h5>

<img
id="image"
class="img-fluid rounded border"
src="https://via.placeholder.com/300x200?text=No+Image"
alt="No Image">

</div>

</div>

<hr>

<h4 class="mb-3">
Complaint Progress
</h4>

<ul class="list-group" id="timeline"></ul>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

<script>

const complaintId = localStorage.getItem("selectedComplaint");

if (!complaintId) {

    alert("No complaint selected.");

    window.location = "complaint-history.html";

}

async function loadComplaint() {

    const { data: complaint, error } = await supabaseClient
        .from("complaints")
        .select("*")
        .eq("id", complaintId)
        .single();

    if (error || !complaint) {

        alert("Complaint not found");

        window.location = "complaint-history.html";

        return;

    }

    document.getElementById("cid").innerHTML = complaint.id;

    document.getElementById("title").innerHTML = complaint.title;

    document.getElementById("category").innerHTML = complaint.category;

    document.getElementById("priority").innerHTML = complaint.priority;

    document.getElementById("description").innerHTML = complaint.description;

    document.getElementById("location").innerHTML = complaint.location;

    document.getElementById("status").innerHTML = complaint.status;

    document.getElementById("remarks").innerHTML =
        complaint.remarks || "No Remarks";

    if (complaint.created_at) {

        document.getElementById("date").innerHTML =
            new Date(complaint.created_at).toLocaleString("en-IN");

    } else {

        document.getElementById("date").innerHTML =
            complaint.date || "";

    }

    if (complaint.image && complaint.image !== "") {

        document.getElementById("image").src = complaint.image;

    } else {

        document.getElementById("image").src =
            "https://via.placeholder.com/300x200?text=No+Image";

    }

    let timelineHTML = "";

    if (complaint.timeline && complaint.timeline.length > 0) {

        complaint.timeline.forEach(item => {

            timelineHTML += `
            <li class="list-group-item">

                <h6 class="text-primary">
                    ${item.status}
                </h6>

                <small>
                    ${item.date}
                </small>

                ${item.remarks ? `<div>${item.remarks}</div>` : ""}

            </li>`;
        });

    } else {

        timelineHTML = `
        <li class="list-group-item text-center">
            No Timeline Available
        </li>`;

    }

    document.getElementById("timeline").innerHTML = timelineHTML;

}

loadComplaint();

</script>

</body>
</html>
