<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sender Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
Complaint Tracker
</a>

<div class="ms-auto">

<span class="text-white me-3" id="username"></span>

<button class="btn btn-light btn-sm" onclick="logout()">
Logout
</button>

</div>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-4">
Welcome,
<span id="welcomeUser"></span>
</h2>

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Total Complaints</h5>

<h2 id="totalComplaints">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Submitted</h5>

<h2 id="submittedCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>In Progress</h5>

<h2 id="progressCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow text-center">

<div class="card-body">

<h5>Resolved</h5>

<h2 id="resolvedCount">0</h2>

</div>

</div>

</div>

</div>

<div class="row mt-5">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h4>➕</h4>

<h5>Submit Complaint</h5>

<p>Create a new complaint.</p>

<a href="submit-complaint.html" class="btn btn-primary">
Open
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h4>📜</h4>

<h5>Complaint History</h5>

<p>View all submitted complaints.</p>

<a href="complaint-history.html" class="btn btn-success">
View
</a>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h4>🔍</h4>

<h5>Track Complaint</h5>

<p>Check complaint progress.</p>

<a href="track-complaint.html" class="btn btn-warning">
Track
</a>

</div>

</div>

</div>

</div>

<div class="row mt-4">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h4>👤</h4>

<h5>Profile</h5>

<p>View your profile.</p>

<a href="profile.html" class="btn btn-dark">
Open
</a>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

<script>

let user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){

window.location = "login.html";

}

document.getElementById("username").innerHTML = user.name;

document.getElementById("welcomeUser").innerHTML = user.name;

async function loadDashboard(){

const { data: complaints, error } = await supabaseClient
.from("complaints")
.select("*")
.eq("email", user.email);

if(error){

console.log(error);

alert(error.message);

return;

}

document.getElementById("totalComplaints").innerHTML =
complaints.length;

document.getElementById("submittedCount").innerHTML =
complaints.filter(c => c.status === "Submitted").length;

document.getElementById("progressCount").innerHTML =
complaints.filter(c => c.status === "In Progress").length;

document.getElementById("resolvedCount").innerHTML =
complaints.filter(c => c.status === "Resolved").length;

}

loadDashboard();

function logout(){

localStorage.removeItem("currentUser");

window.location = "login.html";

}

</script>

</body>

</html>
