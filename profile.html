<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a href="sender-dashboard.html" class="navbar-brand fw-bold">
Complaint Tracker
</a>

<a href="sender-dashboard.html" class="btn btn-light">
Dashboard
</a>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>My Profile</h3>

</div>

<div class="card-body">

<div class="text-center mb-4">

<img
src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
width="120"
class="rounded-circle border">

<h4 class="mt-3" id="userName"></h4>

</div>

<form id="profileForm">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Full Name</label>

<input
type="text"
id="name"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Mobile Number</label>

<input
type="text"
id="mobile"
class="form-control">

</div>

</div>

<div class="mb-3">

<label class="form-label">Email</label>

<input
type="email"
id="email"
class="form-control"
readonly>

</div>

<div class="mb-3">

<label class="form-label">Address</label>

<textarea
id="address"
rows="3"
class="form-control"></textarea>

</div>

<hr>

<div class="row text-center">

<div class="col-md-4">

<h5>Total</h5>

<h3 id="total">0</h3>

</div>

<div class="col-md-4">

<h5>Pending</h5>

<h3 id="pending">0</h3>

</div>

<div class="col-md-4">

<h5>Resolved</h5>

<h3 id="resolved">0</h3>

</div>

</div>

<hr>

<div class="d-grid">

<button type="submit" class="btn btn-success btn-lg">

Save Profile

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

<script>

let user = JSON.parse(localStorage.getItem("currentUser"));

if (!user) {
    alert("Please login first.");
    window.location.href = "login.html";
}

async function loadProfile() {

    const { data: userData, error } = await supabaseClient
        .from("users")
        .select("*")
        .eq("email", user.email)
        .single();

    if (error) {
        alert(error.message);
        return;
    }

    document.getElementById("userName").innerHTML = userData.name || "";
    document.getElementById("name").value = userData.name || "";
    document.getElementById("mobile").value = userData.mobile || "";
    document.getElementById("email").value = userData.email || "";
    document.getElementById("address").value = userData.address || "";

    const { data: complaints, error: complaintError } = await supabaseClient
        .from("complaints")
        .select("*")
        .eq("email", user.email);

    if (complaintError) {
        console.error(complaintError);
    }

    const list = complaints || [];

    document.getElementById("total").innerHTML = list.length;

    document.getElementById("pending").innerHTML =
        list.filter(c => c.status !== "Resolved").length;

    document.getElementById("resolved").innerHTML =
        list.filter(c => c.status === "Resolved").length;
}

document.getElementById("profileForm").addEventListener("submit", async function (e) {

    e.preventDefault();

    const updatedName = document.getElementById("name").value.trim();
    const updatedMobile = document.getElementById("mobile").value.trim();
    const updatedAddress = document.getElementById("address").value.trim();

    const { error } = await supabaseClient
        .from("users")
        .update({
            name: updatedName,
            mobile: updatedMobile,
            address: updatedAddress
        })
        .eq("email", user.email);

    if (error) {
        alert(error.message);
        return;
    }

    user = {
        ...user,
        name: updatedName,
        mobile: updatedMobile,
        address: updatedAddress
    };

    localStorage.setItem("currentUser", JSON.stringify(user));

    alert("Profile Updated Successfully");

    await loadProfile();

    document.getElementById("userName").innerHTML = updatedName;
});

loadProfile();

</script>
</body>

</html>
