<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="sender-dashboard.html">
                Complaint Tracker
            </a>

            <a href="sender-dashboard.html" class="btn btn-light">
                Dashboard
            </a>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="mb-4">My Complaint History</h2>

        <div class="row mb-3">
            <div class="col-md-6">
                <input type="text"
                       id="search"
                       class="form-control"
                       placeholder="Search by Complaint ID or Title">
            </div>
        </div>

        <div class="table-responsive">

            <table class="table table-bordered table-hover bg-white">

                <thead class="table-primary">

                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>

                </thead>

                <tbody id="complaintTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/supabase.js"></script>

    <script>

        let user = JSON.parse(localStorage.getItem("currentUser"));

        if (!user) {
            window.location = "login.html";
        }

        let myComplaints = [];

        async function fetchComplaints() {

            const { data, error } = await supabaseClient
                .from("complaints")
                .select("*")
                .eq("email", user.email)
                .order("created_at", { ascending: false });

            if (error) {
                console.error(error);
                alert(error.message);
                return;
            }

            myComplaints = data || [];

            loadComplaints(myComplaints);
        }

        function loadComplaints(list) {

            let table = "";

            if (list.length === 0) {

                table = `
                <tr>
                    <td colspan="7" class="text-center">
                        No Complaints Found
                    </td>
                </tr>`;

            } else {

                list.forEach(c => {

                    table += `
                    <tr>

                        <td>${c.id}</td>

                        <td>${c.title}</td>

                        <td>${c.category}</td>

                        <td>${c.priority}</td>

                        <td>
                            <span class="badge bg-info">
                                ${c.status}
                            </span>
                        </td>

                        <td>${new Date(c.created_at).toLocaleDateString("en-IN")}</td>

                        <td>

                            <button
                                class="btn btn-primary btn-sm"
                                onclick="viewComplaint('${c.id}')">

                                View

                            </button>

                        </td>

                    </tr>`;
                });

            }

            document.getElementById("complaintTable").innerHTML = table;

        }

        document.getElementById("search").addEventListener("keyup", function () {

            let value = this.value.toLowerCase();

            let filtered = myComplaints.filter(c =>

                c.title.toLowerCase().includes(value) ||

                c.id.toString().includes(value)

            );

            loadComplaints(filtered);

        });

        function viewComplaint(id) {

            localStorage.setItem("selectedComplaint", id);

            window.location = "track-complaint.html";

        }

        fetchComplaints();

    </script>

</body>

</html>
