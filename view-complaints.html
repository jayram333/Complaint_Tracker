<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Complaints</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold">
Complaint Tracker - Receiver Portal
</a>

<a href="admin-dashboard.html" class="btn btn-light">
Dashboard
</a>

</div>

</nav>

<div class="container mt-4">

<h2 class="mb-4">
Manage Complaints
</h2>

<div class="row mb-4">

<div class="col-md-4">

<input
type="text"
id="search"
class="form-control"
placeholder="Search Complaint">

</div>

<div class="col-md-3">

<select id="statusFilter" class="form-select">

<option value="">All Status</option>
<option>Submitted</option>
<option>Under Review</option>
<option>Assigned</option>
<option>In Progress</option>
<option>Resolved</option>
<option>Rejected</option>

</select>

</div>

<div class="col-md-3">

<select id="categoryFilter" class="form-select">

<option value="">All Categories</option>
<option>Road</option>
<option>Water Supply</option>
<option>Electricity</option>
<option>Garbage</option>
<option>Street Light</option>
<option>Drainage</option>
<option>Other</option>

</select>

</div>

<div class="col-md-2">

<button
class="btn btn-primary w-100"
onclick="fetchComplaints()">

Refresh

</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover bg-white">

<thead class="table-primary">

<tr>

<th>ID</th>
<th>Name</th>
<th>Title</th>
<th>Category</th>
<th>Priority</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>

<script>

if(localStorage.getItem("adminLogin")!="true"){

window.location="admin-login.html";

}

let complaints=[];

async function fetchComplaints(){

const {data,error}=await supabaseClient
.from("complaints")
.select("*")
.order("created_at",{ascending:false});

if(error){

console.error(error);

alert(error.message);

return;

}

complaints=data||[];

loadTable();

}

function loadTable(){

let search=document.getElementById("search").value.toLowerCase();

let status=document.getElementById("statusFilter").value;

let category=document.getElementById("categoryFilter").value;

let filtered=complaints.filter(c=>{

let matchSearch=

c.id.toString().toLowerCase().includes(search)||

(c.title||"").toLowerCase().includes(search)||

(c.name||"").toLowerCase().includes(search);

let matchStatus=status==""||c.status==status;

let matchCategory=category==""||c.category==category;

return matchSearch&&matchStatus&&matchCategory;

});

let html="";

if(filtered.length==0){

html=`

<tr>

<td colspan="8" class="text-center">

No Complaints Found

</td>

</tr>
`;

}

filtered.forEach(c=>{

let badge="bg-secondary";

if(c.status=="Submitted") badge="bg-warning";
if(c.status=="Under Review") badge="bg-info";
if(c.status=="Assigned") badge="bg-primary";
if(c.status=="In Progress") badge="bg-dark";
if(c.status=="Resolved") badge="bg-success";
if(c.status=="Rejected") badge="bg-danger";

html+=`

<tr>

<td>${c.id}</td>

<td>${c.name||""}</td>

<td>${c.title}</td>

<td>${c.category}</td>

<td>

<span class="badge bg-secondary">

${c.priority}

</span>

</td>

<td>

<span class="badge ${badge}">

${c.status}

</span>

</td>

<td>

${c.created_at?

new Date(c.created_at).toLocaleDateString("en-IN")

:""}

</td>

<td>

<button

class="btn btn-success btn-sm"

onclick="openComplaint('${c.id}')">

View

</button>

</td>

</tr>

`;
});

document.getElementById("tableBody").innerHTML = html;

}

document.getElementById("search").addEventListener("keyup", loadTable);

document.getElementById("statusFilter").addEventListener("change", loadTable);

document.getElementById("categoryFilter").addEventListener("change", loadTable);

function openComplaint(id){

localStorage.setItem("selectedComplaint", id);

window.location = "complaint-details.html";

}

fetchComplaints();

</script>

</body>

</html>
